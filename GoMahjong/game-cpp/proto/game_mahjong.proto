syntax = "proto3";

package gomahjong.game;

// ==================== 基础类型 ====================

// 牌
message Tile {
  int32 type = 1;  // TileType 连续编码 (0-33)
  int32 id = 2;    // 同类型编号 (0-3)，数牌5的id=0为赤宝牌
}

// 场况
message Situation {
  int32 dealer_index = 1;  // 庄家座位 (0-3)
  string round_wind = 2;   // 场风: "East","South","West","North"
  int32 round_number = 3;  // 局数 (1-4)
  int32 honba = 4;         // 本场数
  int32 riichi_sticks = 5; // 供托（立直棒）
}

// 副露（鸣牌）
message Meld {
  string action_type = 1;  // "CHI","PENG","GANG","ANKAN","KAKAN"
  int32 seat_index = 2;    // 鸣牌玩家座位
  int32 from_seat = 3;     // 来源玩家座位（暗杠=-1）
  repeated Tile tiles = 4; // 副露的牌
}

// 和牌信息
message HuClaim {
  int32 winner_seat = 1;   // 和牌玩家座位
  int32 loser_seat = 2;    // 放铳玩家座位（自摸时=-1）
  Tile win_tile = 3;       // 和牌
  int32 han = 4;           // 番数
  int32 fu = 5;            // 符数
  repeated int32 yaku = 6; // 役列表
  int32 points = 7;        // 点数
}

// 玩家排名
message PlayerRanking {
  int32 seat_index = 1;
  string player_id = 2;
  int32 points = 3;
  int32 rank = 4;          // 排名 (1-4)
}

// 玩家座位映射
message PlayerSeat {
  int32 seat_index = 1;
  string player_id = 2;
}

// 可选操作
message PlayerOperation {
  string type = 1;         // "HU","GANG","PENG","CHI"
  repeated Tile tiles = 2; // 操作涉及的牌
}

// 单个玩家的公开信息（重连快照用）
message PlayerPublicState {
  int32 seat_index = 1;
  repeated Tile discard_tiles = 2;   // 弃牌区
  repeated Meld melds = 3;           // 副露
  bool riichi = 4;                   // 是否立直
  int32 points = 5;                  // 当前点数
}

// ==================== 客户端请求 (C→S) ====================

// 获取快照，用于重连
message SnapShootRequest {}

// 出牌请求
message PlayTileRequest {
  Tile tile = 1;
}

// 鸣牌请求（吃/碰/明杠）
message MeldRequest {
  string action_type = 1;  // "CHI","PENG","GANG"
  repeated Tile tiles = 2; // 选择的牌
}

// 暗杠请求
message AnkanRequest {
  repeated Tile tiles = 1; // 暗杠的牌
}

// 加杠请求
message KakanRequest {
  Tile tile = 1;           // 加杠的牌
}

// 立直请求
message RiichiRequest {
  Tile tile = 1;           // 立直时打出的牌
}

// 跳过操作（不吃不碰不和）
message SkipRequest {}

// Debug: 创建房间请求
message DebugCreateRoomRequest {
  int32 engine_type = 1;
  repeated string player_ids = 2;
}

// Debug: 创建房间响应
message DebugCreateRoomResponse {
  string room_id = 1;
}

// ==================== 服务端推送 (S→C) ====================

// 回合开始（每人收到不同手牌）
message RoundStartPush {
  repeated PlayerSeat seats = 1;         // 座位映射
  repeated Tile dora_indicators = 2;      // 已翻开的宝牌指示牌
  Situation situation = 3;               // 场况
  repeated Tile hand_tiles = 4;           // 自己的手牌（仅自己可见）
  int32 current_turn = 5;                 // 当前出牌玩家座位
}

// 摸牌推送（仅自己可见）
message DrawTilePush {
  Tile tile = 1;
  bool is_kan_draw = 2;           // 是否为岭上摸牌（杠后摸牌）
}

// 出牌广播
message DiscardTilePush {
  int32 seat_index = 1;
  Tile tile = 2;
}

// 立直广播
message RiichiPush {
  int32 seat_index = 1;
}

// 鸣牌广播（吃/碰/明杠）
message MeldActionPush {
  string action_type = 1;  // "CHI","PENG","GANG"
  int32 seat_index = 2;
  int32 from_seat = 3;
  repeated Tile tiles = 4;
  Tile dora_indicator = 5;  // 杠后新翻的宝牌指示牌（仅GANG时有值）
}

// 暗杠广播
message AnkanPush {
  int32 seat_index = 1;
  repeated Tile tiles = 2;
  Tile dora_indicator = 3;  // 杠后新翻的宝牌指示牌
}

// 加杠广播
message KakanPush {
  int32 seat_index = 1;
  int32 from_seat = 2;     // 原碰来源
  repeated Tile tiles = 3;
  Tile dora_indicator = 4;  // 杠后新翻的宝牌指示牌
}

// 荣和广播（支持双响/三响：多人同时荣和发多条 RonPush）
message RonPush {
  int32 winner_seat = 1;
  int32 loser_seat = 2;
  Tile win_tile = 3;
}

// 自摸广播
message TsumoPush {
  int32 winner_seat = 1;
  Tile win_tile = 2;
}

// 回合结束广播
message RoundEndPush {
  string end_type = 1;                   // "RON","TSUMO","DRAW_EXHAUSTIVE","DRAW_3RON","DRAW_4KAN"
  repeated HuClaim claims = 2;
  repeated Tile ura_dora_indicators = 3; // 里宝牌指示牌（立直和牌时翻开）
  repeated int32 delta = 4;              // 点数变化 [4]
  repeated int32 points = 5;             // 当前点数 [4]
  string reason = 6;                     // 流局原因
  int32 next_dealer = 7;                 // 下局庄家座位（-1=游戏结束）
}

// 游戏结束广播
message GameEndPush {
  repeated PlayerRanking rankings = 1;
}

// 玩家断线通知
message PlayerDisconnectPush {
  int32 seat_index = 1;
}

// 玩家重连通知
message PlayerReconnectPush {
  int32 seat_index = 1;
}

// 可选操作推送（每人不同）
message OperationsPush {
  repeated PlayerOperation operations = 1;
  int32 available_secs = 2;              // 操作限时秒数
}

// 游戏状态推送（重连快照）
message GameStatePush {
  repeated PlayerSeat seats = 1;             // 座位映射
  Situation situation = 2;                   // 场况
  repeated Tile dora_indicators = 3;         // 宝牌指示牌
  repeated Tile hand_tiles = 4;              // 自己的手牌（仅自己可见）
  repeated PlayerPublicState players = 5;    // 各玩家公开信息
  int32 current_turn = 6;                    // 当前出牌玩家座位
  int32 remaining_tiles = 7;                 // 剩余牌数
  repeated PlayerOperation operations = 8;   // 当前可选操作
  int32 available_secs = 9;                  // 操作限时秒数
}
syntax = "proto3";

package gomahjong.game;

// 牌
message Tile {
  int32 type = 1;  // 牌的类型 (万、条、筒、风、箭等)
  int32 id = 2;    // 牌的 ID (1-9 等)
}

// 出牌请求
message PlayTileRequest {
  Tile tile = 1;           // 打出的牌
  uint64 room_id = 2;      // 房间 ID
}

// 出牌响应
message PlayTileResponse {
  bool success = 1;
  string message = 2;      // 错误信息
  int32 next_turn = 3;     // 下一个玩家的座位号 (0-3)
}

// 游戏状态推送
message GameStatePush {
  uint64 room_id = 1;
  repeated Tile hand_tiles = 2;    // 手牌
  repeated Tile discard_tiles = 3; // 弃牌区
  int32 current_turn = 4;          // 当前玩家座位号
  int32 remaining_tiles = 5;       // 剩余牌数
}
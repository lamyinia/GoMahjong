syntax = "proto3";

package gomahjong.net;

// 认证请求
message AuthRequest {
  string token = 1;        // JWT token 或 session key
  string device_id = 2;    // 设备标识（可选）
  string version = 3;      // 客户端版本（可选）
}

// 认证响应
message AuthResponse {
  bool success = 1;
  string message = 2;      // 错误信息
  uint64 pid = 3;          // 玩家 ID（成功时返回）
  string nickname = 4;     // 昵称（可选）
}

services:
  mongo:
    image: mongo:7
    container_name: gomahjong-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: gomahjong

  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: gomahjong-etcd
    restart: unless-stopped
    ports:
      - "2379:2379"
    command: >
      etcd
      --listen-client-urls http://0.0.0.0:2379
      --advertise-client-urls http://127.0.0.1:2379
    volumes:
      - etcd_data:/etcd-data

  redis:
    image: redis:7-alpine
    container_name: gomahjong-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nats:
    image: nats:2-alpine
    container_name: gomahjong-nats
    restart: unless-stopped
    ports:
      - "4222:4222"

volumes:
  mongo_data:
  etcd_data:
  redis_data:

syntax = "proto3";

package gomahjong.game;

option go_package = "webtest/proto";

// 牌
message Tile {
  int32 type = 1;  // 牌的类型 (万、条、筒、风、箭等)
  int32 id = 2;    // 牌的 ID (1-9 等)
}

// 出牌请求
message PlayTileRequest {
  Tile tile = 1;           // 打出的牌
}

// 游戏状态推送
message GameStatePush {
  uint64 room_id = 1;
  repeated Tile hand_tiles = 2;    // 手牌
  repeated Tile discard_tiles = 3; // 弃牌区
  int32 remaining_tiles = 5;       // 剩余牌数
}

// Debug: 创建房间请求（跳过 march 匹配）
message DebugCreateRoomRequest {
  int32 engine_type = 1;           // 1: RiichiMahjong4P
  repeated string player_ids = 2;  // 玩家 ID 列表
}

// Debug: 创建房间响应
message DebugCreateRoomResponse {
  string room_id = 1;              // 创建成功的房间 ID
}